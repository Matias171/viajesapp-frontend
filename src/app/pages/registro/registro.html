<div class="login-wrapper">
  <div class="login-card">

    <div class="logo">Viajes<span>App</span></div>
    <p class="subtitulo">Crea tu cuenta</p>

    <div class="campo">
      <label>Nombre completo</label>
      <input type="text" [(ngModel)]="nombre" placeholder="Tu nombre">
    </div>

    <div class="campo">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="correo@ejemplo.com">
    </div>

    <div class="campo">
      <label>Contraseña</label>
      <input type="password" [(ngModel)]="password" placeholder="Elige una contraseña">
    </div>

    <div class="error" *ngIf="error">{{ error }}</div>
    <div class="exito" *ngIf="exito">{{ exito }}</div>

    <button class="btn-entrar" (click)="registrar()" [disabled]="cargando">
      {{ cargando ? 'Creando cuenta...' : 'Crear cuenta' }}
    </button>

    <p class="registro-link">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
    </p>

  </div>
</div>
